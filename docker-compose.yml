# CookingFoil — local Switch homebrew shop.
# Configure via .env (see .env.example). Mount your game library at ./games.
services:
  cookingfoil:
    image: ghcr.io/jshsakura/oc-cookingfoil:latest
    container_name: cookingfoil
    hostname: cookingfoil
    build:
      context: .
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-oc-cookingfoil*}
      COOK_PORT: 80
      COOK_GAMES_DIR: /games
      COOK_DATA_DIR: /data
      COOK_KEYS_DIR: /keys
      COOK_LANG_PRIORITY: ${COOK_LANG_PRIORITY:-ko,en,ja}
      # Auto-refresh titledb every N hours while running (default 24).
      COOK_TITLEDB_REFRESH_INTERVAL_HOURS: ${COOK_TITLEDB_REFRESH_INTERVAL_HOURS:-24}
      # Optional explicit path. Defaults to /games/custom_entries.jsonc.
      COOK_CUSTOM_ENTRIES: ${COOK_CUSTOM_ENTRIES:-}
      # Basic auth — leave unset to disable. Format: "user:pass,user2:pass2".
      COOK_AUTH_USERS: ${COOK_AUTH_USERS:-}
      COOK_UNAUTHORIZED_MSG: ${COOK_UNAUTHORIZED_MSG:-No tricks and treats for you!!}
      COOK_WELCOME_MSG: ${COOK_WELCOME_MSG:-CookingFoil is serving fresh.}
    ports:
      # Host:container. Change the host side freely; container side stays 80.
      - "${COOK_HOST_PORT:-9080}:80"
    volumes:
      # Game library — required.
      - ./games:/games
      # Persistent runtime cache (extracted icons + titledb). Auto-created.
      - ./data:/data
      # Switch console keys for NACP extraction (drop prod.keys here).
      # Read-only; server runs without it but won't extract icons/metadata.
      - ./keys:/keys:ro
      # Optional: shop template overrides (welcome message, custom headers, ...)
      # Mounts to /shop_template.jsonc — same path the legacy tinfoil-hat
      # image used, so an existing compose can swap just `image:` and keep
      # the rest of the volumes/env unchanged.
      - ./shop_template.jsonc:/shop_template.jsonc:ro
