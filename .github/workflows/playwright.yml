name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_call:

env:
  # See ghcr-publish.yml — Node 20 actions deprecation, 2026-06-02 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Stage test environment
        # Don't stage the root .env — playwright.config.ts deliberately
        # avoids loading it, so the webServer subprocess only sees what
        # test/project/.env supplies (no leaked /data, /games defaults).
        run: cp -f ./test/project/.env.example ./test/project/.env
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
