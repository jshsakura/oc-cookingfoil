      const LANG_KEY = "cookingfoil:lang";
      let lang = localStorage.getItem(LANG_KEY)
        || (navigator.language?.toLowerCase().startsWith("ko") ? "ko" : "en");
      function t(key, ...args) {
        const bundle = I18N[lang] || I18N.en;
        const v = bundle[key] ?? I18N.en[key] ?? key;
        return typeof v === "function" ? v(...args) : v;
      }
      function applyI18n() {
        document.documentElement.setAttribute("lang", lang);
        document.documentElement.setAttribute("data-lang", lang);
        // data-i18n: plain text (safe). data-i18n-html: allows inline tags
        // (e.g. <br>, <code>, <em>) authored in the bundle itself.
        for (const el of document.querySelectorAll("[data-i18n]"))      el.textContent = t(el.dataset.i18n);
        for (const el of document.querySelectorAll("[data-i18n-html]")) el.innerHTML  = t(el.dataset.i18nHtml);
        $("search").placeholder = t("search.placeholder");
        for (const b of document.querySelectorAll(".lang-toggle button")) b.classList.toggle("active", b.dataset.lang === lang);
        if (nameHealthData) renderNameHealth(nameHealthData);
        if (shopData) renderAll(shopData); else { $("status-text").textContent = t("status.loading"); }
      }

      // ─── utils ─────────────────────────────────────────────────────────────
      const $ = (id) => document.getElementById(id);
      const fmtBytes = (n) => {
        if (!Number.isFinite(n) || n <= 0) return "—";
        const u = ["B","KB","MB","GB","TB"]; let i = 0, v = n;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2) + " " + u[i];
      };
      const fmtDate = (yyyymmdd) => {
        const s = String(yyyymmdd || ""); if (s.length !== 8) return "—";
        return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
      };
      const toast = (msg) => {
        const el = document.createElement("div");
        el.className = "toast"; el.textContent = msg;
        $("toasts").appendChild(el);
        setTimeout(() => el.remove(), 2400);
      };
      const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

      // Inline placeholder SVGs for the "icon missing" state. We swap the
      // img's `src` to one of these on 404 / no-icon-url, so the browser
      // sees a successfully-loaded image (no broken-glyph X) and
      // `object-fit: cover` paints it edge-to-edge in the 72×72 cover
      // box. The 1:1 viewBox matches the cover aspect so there's no
      // letterbox or weird centering. Adapted from the oc-scraper
      // sibling project's PosterImage — Catppuccin Mocha (dark) and
      // Latte (light) palettes.
      const COVER_PLACEHOLDER_DARK = "data:image/svg+xml;utf8," + encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96' preserveAspectRatio='xMidYMid slice'>" +
          "<defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>" +
            "<stop offset='0%' stop-color='#1e1e2e'/><stop offset='100%' stop-color='#313244'/>" +
          "</linearGradient></defs>" +
          "<rect width='96' height='96' fill='url(#g)'/>" +
          "<rect x='20' y='24' width='56' height='42' rx='6' fill='none' stroke='#7f849c' stroke-width='2'/>" +
          "<circle cx='30' cy='36' r='4' fill='#7f849c'/>" +
          "<path d='M22 60L36 42L48 52L60 38L74 60Z' fill='#6c7086'/>" +
          "<path d='M26 60L36 48L48 56L60 46L70 60Z' fill='#9399b2'/>" +
          "<text x='48' y='82' text-anchor='middle' fill='#a6adc8' font-family='system-ui,sans-serif' font-size='9' font-weight='600'>No Image</text>" +
        "</svg>"
      );
      const COVER_PLACEHOLDER_LIGHT = "data:image/svg+xml;utf8," + encodeURIComponent(
        "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96' preserveAspectRatio='xMidYMid slice'>" +
          "<defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>" +
            "<stop offset='0%' stop-color='#eff1f5'/><stop offset='100%' stop-color='#ccd0da'/>" +
          "</linearGradient></defs>" +
          "<rect width='96' height='96' fill='url(#g)'/>" +
          "<rect x='20' y='24' width='56' height='42' rx='6' fill='#eff1f5' stroke='#8c8fa1' stroke-width='2'/>" +
          "<circle cx='30' cy='36' r='4' fill='#8c8fa1'/>" +
          "<path d='M22 60L36 42L48 52L60 38L74 60Z' fill='#9ca0b0'/>" +
          "<path d='M26 60L36 48L48 56L60 46L70 60Z' fill='#7c7f93'/>" +
          "<text x='48' y='82' text-anchor='middle' fill='#5c5f77' font-family='system-ui,sans-serif' font-size='9' font-weight='600'>No Image</text>" +
        "</svg>"
      );
      function coverPlaceholder() {
        return window.matchMedia("(prefers-color-scheme: light)").matches
          ? COVER_PLACEHOLDER_LIGHT
          : COVER_PLACEHOLDER_DARK;
      }

      // Pick the display name for the current UI language. The server name
      // is Korean-first (COOK_LANG_PRIORITY) and may arrive already decorated
      // as 'Korean (English)' so on-device Tinfoil search matches.
      //   ko: keep that 'Korean (English)' form for brand recognition.
      //   en: prefer English outright — strip any '(…)' wrapping and swap a
      //       CJK display name for its English alias when one exists.
      // Falls back to the given name whenever no better candidate exists.
      // Toggling the lang button re-renders, so cards update without a refresh.
      const asciiRatio = (s) =>
        s.replace(/[^\x20-\x7E]/g, "").length / Math.max(1, s.length);
      const coreName = (name) =>
        name.replace(/\s*\([^()]*\)\s*$/, "").trim() || name;

      function nameWithAlias(name, aliases) {
        if (!name) return name;
        const list = Array.isArray(aliases) ? aliases : [];
        const core = coreName(name);

        if (lang === "en") {
          if (asciiRatio(core) > 0.7) return core; // already English-y
          const eng = list.find((a) => a && a !== core && asciiRatio(a) > 0.7);
          return eng || name;
        }

        // Korean UI: keep an already-decorated name, else append an English alias.
        if (asciiRatio(core) > 0.7) return name;
        const eng = list.find((a) => a && a !== core && asciiRatio(a) > 0.7);
        return eng ? core + " (" + eng + ")" : name;
      }

      function animateCount(el, target, duration = 700) {
        const start = 0, t0 = performance.now();
        function step(now) {
          const k = Math.min(1, (now - t0) / duration);
          const eased = 1 - Math.pow(1 - k, 3);
          el.textContent = Math.round(start + (target - start) * eased).toLocaleString();
          if (k < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      // ─── url / copy ────────────────────────────────────────────────────────
      // CLEAN shop URL only — the password is never embedded (it would leak via
      // browser history / proxy logs / Referer). /api/connect-url returns the
      // canonical URL; users enter their own credentials in the client's
      // Username / Password fields. Falls back to the live origin on fetch fail.
      let baseUrl = `${location.protocol}//${location.host}/shop.tfl`;
      const urlEl = $("shop-url");
      urlEl.textContent = baseUrl; // hidden under the .sk shimmer until settled
      fetch("/api/connect-url", { headers: { Accept: "application/json" } })
        .then((r) => (r.ok ? r.json() : null))
        .then((d) => { if (d && d.url) baseUrl = d.url; })
        .catch(() => { /* keep the placeholder */ })
        .finally(() => { urlEl.textContent = baseUrl; urlEl.classList.remove("sk"); });
      $("copy-btn").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(baseUrl); toast(t("toast.copied")); }
        catch { toast(t("toast.copyFail")); }
      });

      // ─── state ─────────────────────────────────────────────────────────────
      let shopData = null;
      let nameHealthData = null;
      let renderedItems = [];
      const state = { kind: "base", q: "", sort: "name", page: 1, perPage: 24 };

      // ─── skeleton placeholders ─────────────────────────────────────────────
      // Drop a grid of shimmering cards in immediately so the first paint
      // already feels populated. Replaced by real cards once /shop.json
      // resolves; never shown again after that.
      function renderSkeletons(n = 8) {
        const grid = $("games");
        grid.innerHTML = "";
        const frag = document.createDocumentFragment();
        for (let i = 0; i < n; i++) {
          const card = document.createElement("div");
          card.className = "game skel";
          card.innerHTML = '<div class="cover"></div><div class="meta"><div class="name-skel"></div><div class="sub-skel"></div></div>';
          frag.appendChild(card);
        }
        grid.appendChild(frag);
      }

      // ─── name-source health ────────────────────────────────────────────────
      // Reads /healthz (no-auth; carries `nameHealth` in both 200 and 503) so
      // the operator SEES why names resolve or fall back to filenames.
      function renderNameHealth(nh) {
        if (!nh || typeof nh !== "object") return;
        const stateEl = $("nh-state");
        const verdictEl = $("nh-verdict");
        stateEl.classList.remove("warn", "bad");
        let verdictKey;
        if (nh.verdict === "degraded") { verdictKey = "nh.verdict.degraded"; stateEl.classList.add("warn"); }
        else if (nh.verdict === "filename-only") { verdictKey = "nh.verdict.filename"; stateEl.classList.add("bad"); }
        else { verdictKey = "nh.verdict.ok"; }
        verdictEl.textContent = t(verdictKey);
        verdictEl.classList.remove("sk");

        const tdb = nh.titledb || {};
        const regions = Array.isArray(tdb.regions) ? tdb.regions : [];
        const tdbEl = $("nh-titledb");
        tdbEl.textContent = t("nh.titles", tdb.titles || 0, regions.join(", "));
        tdbEl.classList.remove("sk");
        tdbEl.classList.toggle("good", (tdb.titles || 0) > 0);

        const ex = nh.extraction || {};
        let extKey;
        if (ex.mode === "off") extKey = "nh.ext.off";
        else if (!ex.nstool) extKey = "nh.ext.nostool";
        else if (!ex.prodKeys) extKey = "nh.ext.nokeys";
        else extKey = "nh.ext.enabled";
        const extEl = $("nh-extraction");
        extEl.textContent = t(extKey);
        extEl.classList.remove("sk", "good", "off");
        extEl.classList.add(ex.nspXciCapable ? "good" : "off");

        const hintEl = $("nh-hint");
        if (nh.verdict === "filename-only") { hintEl.hidden = false; hintEl.textContent = t("nh.hint.filename"); }
        else { hintEl.hidden = true; }
      }

      async function loadNameHealth() {
        try {
          // 200 when cached, 503 while cold — both carry nameHealth. Read either.
          const r = await fetch("/healthz", { headers: { Accept: "application/json" } });
          const d = await r.json().catch(() => null);
          if (d && d.nameHealth) { nameHealthData = d.nameHealth; renderNameHealth(nameHealthData); }
        } catch { /* best effort — panel keeps its shimmer/placeholder */ }
      }

      // ─── data flow ─────────────────────────────────────────────────────────
      async function loadShop() {
        $("status-text").textContent = t("status.loading");
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 60_000);
        const t0 = performance.now();
        try {
          const r = await fetch("/shop.json", { headers: { Accept: "application/json" }, signal: ctrl.signal });
          if (!r.ok) throw new Error("HTTP " + r.status);
          shopData = await r.json();
          const ms = Math.round(performance.now() - t0);
          if (ms > 1500) console.info("[CookingFoil] /shop.json", ms, "ms");
          renderAll(shopData);
        } catch (err) {
          console.error("[CookingFoil] /shop.json failed:", err);
          $("status").classList.remove("warm"); $("status").classList.add("cold");
          $("status-text").textContent = err.name === "AbortError" ? t("status.timeout") : t("status.error", err.message || String(err));
          $("games").innerHTML = `<div class="empty">${t("empty.err")}</div>`;
        } finally {
          clearTimeout(timer);
        }
      }

      function renderAll(shop) {
        const files   = Array.isArray(shop.files) ? shop.files : [];
        const titledb = shop.titledb && typeof shop.titledb === "object" ? shop.titledb : {};
        const tCount  = Object.keys(titledb).length;

        const baseCount   = files.filter(f => (f.kind || "base") === "base").length;
        const updateCount = files.filter(f => f.kind === "update").length;
        const dlcCount    = files.filter(f => f.kind === "dlc").length;
        const modsCount   = updateCount + dlcCount;

        // Show BASE titles in the running marquee — that's what people mean
        // by "how many games". updates + DLC roll up under the base on
        // their cards (the '+N 업데이트' / '+N DLC' pills) and in the
        // /games stat below, so we don't double-count here.
        // Data's here — drop the entry skeletons on the stat values + status.
        for (const id of ["stat-games", "stat-titledb", "stat-base", "stat-mods", "stat-mods-sub"]) {
          $(id).classList.remove("sk");
        }
        $("status-text").classList.remove("sk");

        $("status").classList.remove("cold", "warm");
        if (files.length === 0) {
          $("status").classList.add("warm");
          $("status-text").textContent = t("status.empty");
        } else {
          $("status-text").textContent = t("status.serving", baseCount);
        }

        animateCount($("stat-games"), files.length);
        animateCount($("stat-titledb"), tCount);
        animateCount($("stat-base"), baseCount);
        $("stat-mods").textContent = modsCount.toLocaleString();
        $("stat-mods-sub").textContent = updateCount + " upd · " + dlcCount + " dlc";

        // Roll up update/DLC counts onto each base title so the card can
        // surface 'this base also has N updates / M DLC in your library'.
        const updByBase = new Map(), dlcByBase = new Map();
        for (const f of files) {
          if (!f.baseTitleId) continue;
          if (f.kind === "update") updByBase.set(f.baseTitleId, (updByBase.get(f.baseTitleId) || 0) + 1);
          else if (f.kind === "dlc") dlcByBase.set(f.baseTitleId, (dlcByBase.get(f.baseTitleId) || 0) + 1);
        }

        renderedItems = files.map((f, idx) => {
          const tdb = (f.baseTitleId && titledb[f.baseTitleId]) || (f.titleId && titledb[f.titleId]) || null;
          const kind = f.kind || (tdb ? "base" : "custom");
          // Cross-language search blob: displayed name + every alias the
          // server collected across region files (KR.ko / US.en / JP.ja /
          // EU.en / HK.zh). So 'zelda' finds 젤다, 'マリオ' finds Mario, etc.
          const aliases = Array.isArray(tdb?.aliases) ? tdb.aliases : [];
          const searchBlob = [f.name || "", ...aliases].join("  ").toLowerCase();
          return {
            idx, item: f, tdb, kind,
            name: (f.name || "").toLowerCase(),
            tid: (f.titleId || "").toLowerCase(),
            search: searchBlob,
            size: typeof f.size === "number" ? f.size : 0,
            releaseDate: tdb?.releaseDate || 0,
            updateCount: kind === "base" && f.titleId ? (updByBase.get(f.titleId) || 0) : 0,
            dlcCount:    kind === "base" && f.titleId ? (dlcByBase.get(f.titleId) || 0) : 0,
          };
        });

        state.page = 1;
        applyFilters();
      }

      // ─── filter / sort / paginate ─────────────────────────────────────────
      function visibleSet() {
        const list = renderedItems.filter(r => {
          if (r.kind !== state.kind) return false;
          if (state.q && !r.search.includes(state.q) && !r.tid.includes(state.q)) return false;
          return true;
        });
        list.sort((a, b) => {
          switch (state.sort) {
            case "name-desc":    return b.item.name.localeCompare(a.item.name);
            case "size-desc":    return b.size - a.size;
            case "size-asc":     return a.size - b.size;
            case "release-desc": return (b.releaseDate || 0) - (a.releaseDate || 0);
            case "name":
            default:             return a.item.name.localeCompare(b.item.name);
          }
        });
        return list;
      }

      function applyFilters() {
        const list = visibleSet();
        const total = list.length;
        const pages = Math.max(1, Math.ceil(total / state.perPage));
        state.page = Math.min(state.page, pages);
        const start = (state.page - 1) * state.perPage;
        const slice = list.slice(start, start + state.perPage);

        renderList(slice);
        $("games-count").textContent = `${total.toLocaleString()} / ${renderedItems.length.toLocaleString()}`;
        renderPager(state.page, pages, total, start + 1, Math.min(total, start + slice.length));
      }

      function renderList(list) {
        const grid = $("games");
        grid.innerHTML = "";
        if (list.length === 0) {
          grid.innerHTML = `<div class="empty">${t("empty.none")}</div>`;
          return;
        }
        const frag = document.createDocumentFragment();
        for (const r of list) frag.appendChild(makeCard(r));
        grid.appendChild(frag);
        // NOTE: do NOT scrollIntoView here. renderList() runs on initial load,
        // every search keystroke and every filter change — auto-scrolling on all
        // of those yanks the page around ("자꾸 지가 내려감"). Page-change scroll
        // is handled in the pager button click instead, where it's intentional.
      }

      function makeCard(r) {
        const card = document.createElement("div");
        card.className = "game"; card.tabIndex = 0;
        card.addEventListener("click", () => openModal(r));
        card.addEventListener("keypress", (e) => { if (e.key === "Enter") openModal(r); });

        const cover = document.createElement("img");
        cover.className = "cover loading"; cover.loading = "lazy"; cover.decoding = "async"; cover.alt = "";
        // Shimmer until the bytes land. onerror swaps to a placeholder which
        // then fires `load`, so this clears the skeleton in both cases.
        cover.addEventListener("load", () => cover.classList.remove("loading"), { once: true });
        // Grid covers use the 256-px thumbnail variant (WebP if the
        // browser accepts it). Modal banner / Switch client still hit
        // the original via the same base URL without ?size. icon_url
        // already carries a ?v= cache-bust stamp, so pick the right
        // separator instead of appending a second "?".
        if (r.item.icon_url) {
          const sep = r.item.icon_url.includes("?") ? "&" : "?";
          cover.src = r.item.icon_url + sep + "size=sm";
        } else {
          cover.src = coverPlaceholder();
        }
        // 404 from the icon route → swap src to a valid placeholder SVG
        // data URI. Setting src (not removing it) is what prevents the
        // browser's broken-image glyph from rendering on top: the img
        // is in a "successfully loaded" state, just loaded with a
        // placeholder graphic. `object-fit: cover` then fills the
        // 72×72 box edge-to-edge.
        cover.onerror = () => {
          cover.onerror = null;
          cover.src = coverPlaceholder();
        };

        const meta = document.createElement("div"); meta.className = "meta";
        const name = document.createElement("div"); name.className = "name";
        const aliases = Array.isArray(r.tdb?.aliases) ? r.tdb.aliases : [];
        name.textContent = nameWithAlias(r.item.name || "(unnamed)", aliases);
        const sub  = document.createElement("div"); sub.className = "sub";

        const addPill = (label, className) => {
          if (!label) return;
          const el = document.createElement("span");
          el.className = "pill " + className;
          el.textContent = label;
          if (className.includes("pub")) el.title = label; // full text on hover when ellipsized
          sub.appendChild(el);
        };

        addPill(t("chip." + r.kind) || r.kind, r.kind);
        addPill(fmtBytes(r.size), "neutral mono");
        if (r.tdb?.releaseDate) addPill(fmtDate(r.tdb.releaseDate), "neutral mono");
        if (r.tdb?.publisher)   addPill(r.tdb.publisher, "neutral pub");

        // Related-content cues: only on base cards, only when present.
        // "+N" prefix reads as "this base has N extra X attached" — clearer
        // than "×N" which looked like a multiplier on the base card itself.
        // Korean uses the chip label "업데이트" so the rollup matches the
        // filter chip across the toolbar.
        if (r.updateCount) addPill("+" + r.updateCount + " " + (lang === "ko" ? "업데이트" : "Update"), "update");
        if (r.dlcCount)    addPill("+" + r.dlcCount + " DLC", "dlc");

        meta.appendChild(name); meta.appendChild(sub);
        card.appendChild(cover); card.appendChild(meta);
        return card;
      }

      // Compact pager: « 1 … 5 6 [7] 8 9 … 42 »
      function renderPager(current, total, totalItems, from, to) {
        const p = $("pager"); p.innerHTML = "";
        if (totalItems === 0) return;

        const info = document.createElement("span");
        info.className = "info";
        info.textContent = t("pager.info", from, to, totalItems);
        p.appendChild(info);

        const mkBtn = (label, target, opts = {}) => {
          const b = document.createElement("button");
          b.className = "pager-btn" + (opts.current ? " current" : "");
          b.type = "button"; b.textContent = label;
          if (opts.disabled) b.disabled = true;
          else b.addEventListener("click", () => {
            state.page = target;
            applyFilters();
            // Intentional: changing pages brings the grid top into view.
            $("games").scrollIntoView({ behavior: "smooth", block: "start" });
          });
          return b;
        };

        p.appendChild(mkBtn(t("pager.prev"), current - 1, { disabled: current <= 1 }));

        const window = 2; // pages around current
        const pages = new Set();
        pages.add(1); pages.add(total);
        for (let i = current - window; i <= current + window; i++) {
          if (i >= 1 && i <= total) pages.add(i);
        }
        const sorted = [...pages].sort((a, b) => a - b);
        let prev = 0;
        for (const n of sorted) {
          if (n - prev > 1) {
            const dots = document.createElement("span"); dots.className = "pager-ellipsis"; dots.textContent = "…";
            p.appendChild(dots);
          }
          p.appendChild(mkBtn(String(n), n, { current: n === current }));
          prev = n;
        }

        p.appendChild(mkBtn(t("pager.next"), current + 1, { disabled: current >= total }));
      }

      // ─── modal ─────────────────────────────────────────────────────────────
      // Bumped after every artwork edit; appended to image URLs so a replaced
      // override repaints immediately despite HTTP caching.
      let currentModal = null;
      // Per-title detail/art cache — reopening a title (or revisiting after a
      // filter) reuses the fetched metadata instead of hitting the API again.
      // Keyed by base title id; lives for the page session.
      const detailCache = new Map();
      let artVersion = 0;
      function bustUrl(u) {
        if (!artVersion) return u;
        return u + (u.includes("?") ? "&" : "?") + "_a=" + artVersion;
      }

      async function openModal(r) {
        currentModal = r;
        const f = r.item;
        const baseId = (f.baseTitleId || f.titleId || "").toUpperCase();
        const validBase = /^[0-9A-F]{16}$/.test(baseId);

        // Rich metadata (description, publisher, screenshots, release, region,
        // rating, players) lives behind /api/title/:id because the shop
        // response drops the top-level titledb map (CyberFoil ghost-row
        // avoidance). Fetch that detail alongside operator-supplied art
        // (best effort) so the modal shows full info instead of "—".
        let art = { icon: false, banner: false, screens: [] };
        let detail = {};
        if (validBase) {
          const cached = detailCache.get(baseId);
          if (cached) {
            ({ art, detail } = cached);
          } else {
            const [ar, dr] = await Promise.all([
              fetch(`/api/art/${baseId}`, { headers: { Accept: "application/json" } }).catch(() => null),
              fetch(`/api/title/${baseId}`, { headers: { Accept: "application/json" } }).catch(() => null),
            ]);
            try { if (ar && ar.ok) art = await ar.json(); } catch { /* best effort */ }
            try { if (dr && dr.ok) detail = await dr.json(); } catch { /* best effort */ }
            detailCache.set(baseId, { art, detail });
          }
        }
        // detail (server titledb store) wins over the sparse per-row tdb.
        const td = { ...(r.tdb || {}), ...detail };

        $("modal-title").textContent = nameWithAlias(f.name || "(unnamed)", td.aliases || []);
        $("modal-publisher").textContent = td.publisher || (f.titleId ? "Title ID " + f.titleId : t("chip.custom"));

        // Title image preview beside the heading — every title gets one. Falls
        // back to the placeholder SVG (never a broken-image glyph) on 404.
        const coverEl = $("modal-cover");
        const iconUrl = f.icon_url || (validBase ? `/api/shop/icon/${baseId}` : "");
        coverEl.onerror = () => { coverEl.onerror = null; coverEl.src = coverPlaceholder(); };
        coverEl.src = iconUrl ? bustUrl(iconUrl) : coverPlaceholder();

        const bannerUrl = td.bannerUrl || (validBase && art.banner ? `/api/shop/banner/${baseId}` : "");
        $("modal-banner").style.backgroundImage = bannerUrl ? `url('${bustUrl(bannerUrl)}')` : "";

        const metaBox = $("modal-meta"); metaBox.innerHTML = "";
        const rows = [
          [t("modal.size"),     fmtBytes(r.size)],
          [t("modal.release"),  fmtDate(td.releaseDate)],
          [t("modal.type"),     t("chip." + r.kind) || r.kind],
          [t("modal.titleId"),  f.titleId || "—"],
          [t("modal.region"),   td.region || "—"],
          [t("modal.rating"),   td.rating != null ? String(td.rating) : "—"],
          [t("modal.category"), Array.isArray(td.category) ? td.category.join(", ") : (td.category || "—")],
          [t("modal.players"),  td.numberOfPlayers != null ? String(td.numberOfPlayers) : "—"],
        ];
        for (const [k, v] of rows) {
          const cell = document.createElement("div");
          cell.innerHTML = `<span style="color:var(--overlay1);font-size:11px;letter-spacing:.05em;text-transform:uppercase">${k}</span><strong>${v}</strong>`;
          metaBox.appendChild(cell);
        }
        $("modal-desc").textContent = td.description || t("modal.noDesc");

        const scr = $("modal-screens"); scr.innerHTML = "";
        const shots = [];
        if (Array.isArray(td.screenshots)) shots.push(...td.screenshots);
        if (validBase) for (const i of (art.screens || [])) shots.push(`/api/shop/screenshot/${baseId}/${i}`);
        for (const url of shots) {
          const im = document.createElement("img");
          im.loading = "lazy"; im.src = bustUrl(url); im.alt = "";
          // Icon route returns 404 when the asset isn't on disk yet —
          // hide rather than show a broken-image glyph.
          im.onerror = () => im.remove();
          scr.appendChild(im);
        }

        // Artwork edit controls — only when uploads are enabled.
        renderArtEditor(baseId, validBase, art);

        // Extra (non-installable) files in the title's folder — web-only.
        const extrasBox = $("modal-extras"); extrasBox.innerHTML = "";
        if (validBase) loadExtras(baseId, extrasBox);

        $("modal-download").href = f.url || "#";
        $("modal").classList.add("open"); $("modal").setAttribute("aria-hidden", "false");
      }

      // ─── artwork editor (upload / replace / remove) ────────────────────────
      function artBtn(label, cls, onClick) {
        const b = document.createElement("button");
        b.type = "button"; b.className = "btn " + cls + " tiny"; b.textContent = label;
        b.addEventListener("click", onClick);
        return b;
      }
      function pickAndUpload(baseId, kind) {
        const input = document.createElement("input");
        input.type = "file"; input.accept = "image/*";
        input.addEventListener("change", () => {
          if (input.files && input.files[0]) uploadArt(baseId, kind, input.files[0]);
        });
        input.click();
      }
      // A small live preview thumbnail. Hides itself on 404 so empty slots
      // (no custom art and no titledb art) just show no image.
      function artThumb(url, w, h) {
        const img = document.createElement("img");
        img.className = "art-thumb"; img.loading = "lazy"; img.alt = "";
        img.style.width = w + "px"; img.style.height = h + "px";
        img.onerror = () => { img.style.display = "none"; };
        img.src = bustUrl(url);
        return img;
      }
      function artSlotRow(baseId, kind, label, hasCustom) {
        const row = document.createElement("div"); row.className = "art-row";
        const lab = document.createElement("span"); lab.className = "art-label"; lab.textContent = label;
        row.appendChild(lab);
        const url = kind === "icon"
          ? `/api/shop/icon/${baseId}?size=sm`
          : `/api/shop/banner/${baseId}`;
        row.appendChild(kind === "icon" ? artThumb(url, 42, 42) : artThumb(url, 72, 40));
        row.appendChild(artBtn(hasCustom ? t("art.replace") : t("art.upload"), "", () => pickAndUpload(baseId, kind)));
        if (hasCustom) row.appendChild(artBtn(t("art.remove"), "ghost", () => removeArt(baseId, kind)));
        return row;
      }
      function artScreensRow(baseId, screens) {
        const row = document.createElement("div"); row.className = "art-row";
        const lab = document.createElement("span"); lab.className = "art-label"; lab.textContent = t("art.screens");
        row.appendChild(lab);
        row.appendChild(artBtn(t("art.add"), "", () => pickAndUpload(baseId, "screenshot")));
        for (const i of screens) {
          const wrap = document.createElement("div"); wrap.className = "art-shot";
          wrap.appendChild(artThumb(`/api/shop/screenshot/${baseId}/${i}`, 64, 36));
          const x = document.createElement("button");
          x.type = "button"; x.className = "art-shot-x"; x.textContent = "✕"; x.title = t("art.remove");
          x.addEventListener("click", () => removeArt(baseId, "screenshot", i));
          wrap.appendChild(x);
          row.appendChild(wrap);
        }
        return row;
      }
      function renderArtEditor(baseId, validBase, art) {
        const box = $("modal-art");
        box.innerHTML = ""; box.hidden = true;
        if (!uploadsEnabled || !validBase) return;
        box.hidden = false;
        const head = document.createElement("div");
        head.className = "art-head"; head.textContent = t("art.head");
        box.appendChild(head);
        box.appendChild(artSlotRow(baseId, "icon", t("art.icon"), art.icon));
        box.appendChild(artSlotRow(baseId, "banner", t("art.banner"), art.banner));
        box.appendChild(artScreensRow(baseId, art.screens || []));
      }
      async function uploadArt(baseId, kind, file) {
        const fd = new FormData(); fd.append("file", file, file.name);
        try {
          const res = await fetch(`/api/art/${baseId}/${kind}`, { method: "POST", body: fd });
          const d = await res.json().catch(() => ({}));
          if (!res.ok) { toast(d.error || t("art.failed")); return; }
          toast(t("art.saved"));
          artVersion++;
          if (currentModal) openModal(currentModal); // re-render with fresh art + cache-bust
        } catch { toast(t("art.failed")); }
      }
      async function removeArt(baseId, kind, idx) {
        const url = kind === "screenshot"
          ? `/api/art/${baseId}/screenshot/${idx}`
          : `/api/art/${baseId}/${kind}`;
        try {
          const res = await fetch(url, { method: "DELETE" });
          if (!res.ok) { toast(t("art.failed")); return; }
          toast(t("art.removed"));
          artVersion++;
          if (currentModal) openModal(currentModal);
        } catch { toast(t("art.failed")); }
      }

      // Fetch + render a title's auxiliary files (mods/patches/zips). Best
      // effort: any failure just leaves the section empty. Filenames go in via
      // textContent (never innerHTML) so odd names can't inject markup. A
      // request token guards against a slow response from a previously-closed
      // modal painting into the currently-open one.
      let extrasReq = 0;
      async function loadExtras(baseId, box) {
        const token = ++extrasReq;
        try {
          const res = await fetch(`/api/title/${baseId}/extras`, {
            headers: { Accept: "application/json" },
          });
          if (token !== extrasReq || !res.ok) return;
          const data = await res.json();
          const items = Array.isArray(data.extras) ? data.extras : [];
          if (token !== extrasReq || items.length === 0) return;

          const head = document.createElement("div");
          head.className = "extras-head";
          head.textContent = t("modal.extras") + " (" + items.length + ")";
          box.appendChild(head);

          for (const x of items) {
            const row = document.createElement("a");
            row.className = "extra-row";
            row.href = x.url; row.target = "_blank"; row.rel = "noopener";
            row.setAttribute("download", x.name);
            const nameEl = document.createElement("span");
            nameEl.className = "extra-name"; nameEl.textContent = x.name;
            const sizeEl = document.createElement("span");
            sizeEl.className = "extra-size"; sizeEl.textContent = fmtBytes(x.size);
            row.appendChild(nameEl); row.appendChild(sizeEl);
            box.appendChild(row);
          }
        } catch { /* extras are best-effort */ }
      }
      function closeModal() { $("modal").classList.remove("open"); $("modal").setAttribute("aria-hidden", "true"); }
      $("modal").addEventListener("click", (e) => { if (e.target === $("modal")) closeModal(); });
      $("modal-close").addEventListener("click", closeModal);
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

      // ─── toolbar wiring ───────────────────────────────────────────────────
      $("search").addEventListener("input", debounce(() => { state.q = $("search").value.trim().toLowerCase(); state.page = 1; applyFilters(); }, 100));
      $("chips").addEventListener("click", (e) => {
        if (!(e.target instanceof HTMLButtonElement)) return;
        for (const c of $("chips").children) c.classList.toggle("active", c === e.target);
        state.kind = e.target.dataset.kind; state.page = 1; applyFilters();
      });
      $("sort").addEventListener("change", () => { state.sort = $("sort").value; state.page = 1; applyFilters(); });
      $("refresh-btn").addEventListener("click", async () => {
        $("refresh-btn").disabled = true;
        await Promise.all([loadShop(), loadNameHealth()]);
        $("refresh-btn").disabled = false;
        toast(t("toast.refresh"));
      });

      // language toggle
      document.querySelector(".lang-toggle").addEventListener("click", (e) => {
        if (!(e.target instanceof HTMLButtonElement)) return;
        lang = e.target.dataset.lang;
        localStorage.setItem(LANG_KEY, lang);
        applyI18n();
      });

      // ─── scroll progress ──────────────────────────────────────────────────
      let scrollTicking = false;
      function flushScroll() {
        const h = document.documentElement;
        const max = (h.scrollHeight - h.clientHeight) || 1;
        const pct = Math.min(100, Math.max(0, (h.scrollTop / max) * 100));
        $("scroll-progress").style.width = pct + "%";
        scrollTicking = false;
      }
      document.addEventListener("scroll", () => {
        if (!scrollTicking) { scrollTicking = true; requestAnimationFrame(flushScroll); }
      }, { passive: true });

      // Clicking a stat card jumps to the library, swapping the filter
      // when the stat maps to a kind.
      function bindStatClick(id, kind) {
        const el = $(id)?.parentElement; if (!el) return;
        el.addEventListener("click", () => {
          if (kind) {
            for (const c of $("chips").children) c.classList.toggle("active", c.dataset.kind === kind);
            state.kind = kind; state.page = 1; applyFilters();
          }
          $("games").scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }
      bindStatClick("stat-games",   "base");
      bindStatClick("stat-titledb", null);
      bindStatClick("stat-base",    "base");
      bindStatClick("stat-mods",    "update");

      applyI18n();
      renderSkeletons(8);
      loadShop();
      loadNameHealth();

      // ─── upload tray ──────────────────────────────────────────────────────
      // POST /api/uploads → temp/, then user clicks Apply to move into games/.
      // The whole tray hides when the server reports uploads disabled (503).
      let uploadsEnabled = false;
      const uploadFab   = $("upload-fab");
      const uploadTray  = $("upload-tray");
      const uploadList  = $("upload-list");
      const dropZone    = $("drop-zone");
      const fileInput   = $("file-input");
      const progressBar = $("upload-bar");
      const progressBox = $("upload-progress");

      function fmtBytesShort(n) { return fmtBytes(n); }

      async function refreshUploads() {
        try {
          const r = await fetch("/api/uploads", { headers: { Accept: "application/json" } });
          if (r.status === 503) {
            uploadsEnabled = false;
            uploadFab.classList.remove("show");
            uploadList.innerHTML = `<div class="upload-disabled">${t("upload.disabled")}</div>`;
            return;
          }
          if (!r.ok) throw new Error("HTTP " + r.status);
          const data = await r.json();
          uploadsEnabled = true;
          uploadFab.classList.add("show");
          renderUploadList(data.uploads || []);
        } catch (err) {
          console.error("[CookingFoil] /api/uploads:", err);
        }
      }

      function renderUploadList(items) {
        if (items.length === 0) {
          uploadList.innerHTML = `<div class="upload-empty">${t("upload.empty")}</div>`;
          return;
        }
        uploadList.innerHTML = "";
        for (const u of items) {
          const row = document.createElement("div");
          row.className = "upload-row";
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = u.name;
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `${fmtBytesShort(u.size)} · ${u.kind || "?"} · ${u.baseTitleId || "no-titleid"}`;
          const actions = document.createElement("div");
          actions.className = "actions";
          const apply = document.createElement("button");
          apply.type = "button"; apply.className = "primary";
          apply.textContent = t("upload.apply");
          apply.addEventListener("click", () => applyUpload(u.id, u.name));
          const del = document.createElement("button");
          del.type = "button";
          del.textContent = t("upload.delete");
          del.addEventListener("click", () => deleteUpload(u.id));
          actions.appendChild(apply); actions.appendChild(del);
          row.appendChild(name); row.appendChild(meta); row.appendChild(actions);
          uploadList.appendChild(row);
        }
      }

      function uploadFile(file) {
        // We use XHR (not fetch) so the upload phase reports progress
        // — fetch's body upload progress is still browser-spotty in 2026.
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          const fd = new FormData();
          fd.append("file", file, file.name);
          xhr.open("POST", "/api/uploads");
          xhr.upload.addEventListener("progress", (e) => {
            if (!e.lengthComputable) return;
            progressBar.style.width = ((e.loaded / e.total) * 100).toFixed(1) + "%";
          });
          xhr.addEventListener("load", () => {
            if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
            else reject(new Error("HTTP " + xhr.status + ": " + xhr.responseText));
          });
          xhr.addEventListener("error", () => reject(new Error("network error")));
          xhr.addEventListener("abort", () => reject(new Error("aborted")));
          xhr.send(fd);
        });
      }

      async function pickFile(file) {
        if (!file) return;
        progressBox.classList.add("show");
        progressBar.style.width = "0%";
        try {
          await uploadFile(file);
          await refreshUploads();
        } catch (err) {
          toast(t("upload.failed", err.message || String(err)));
        } finally {
          progressBox.classList.remove("show");
          progressBar.style.width = "0%";
        }
      }

      async function applyUpload(id, name) {
        try {
          const r = await fetch(`/api/uploads/${id}/apply`, { method: "POST" });
          if (!r.ok) throw new Error("HTTP " + r.status + ": " + await r.text());
          toast(t("upload.applied", name));
          await refreshUploads();
          // shop-cache will rebuild via chokidar; ws push refreshes the grid.
        } catch (err) {
          toast(t("upload.failed", err.message || String(err)));
        }
      }

      async function deleteUpload(id) {
        try {
          const r = await fetch(`/api/uploads/${id}`, { method: "DELETE" });
          if (!r.ok) throw new Error("HTTP " + r.status);
          toast(t("upload.deleted"));
          await refreshUploads();
        } catch (err) {
          toast(t("upload.failed", err.message || String(err)));
        }
      }

      uploadFab.addEventListener("click", () => {
        uploadTray.classList.toggle("open");
        if (uploadTray.classList.contains("open")) refreshUploads();
      });
      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const file = e.dataTransfer?.files?.[0];
        pickFile(file);
      });
      fileInput.addEventListener("change", () => pickFile(fileInput.files?.[0]));
      // Probe once on load so the fab only appears when the API is on.
      refreshUploads();

      // ─── realtime: WebSocket library push ─────────────────────────────────
      // The dashboard re-fetches /shop.json on every shop-updated event so
      // additions, removals and metadata refreshes appear without a manual
      // reload. We never push the body itself — the ETag short-circuits
      // unchanged responses to 304.
      let ws = null;
      let wsRetry = 0;
      let wsReloadTimer = null;
      function scheduleReload() {
        // Coalesce a burst of rebuilds (rsync multi-file copy) into one fetch.
        if (wsReloadTimer) clearTimeout(wsReloadTimer);
        wsReloadTimer = setTimeout(() => { wsReloadTimer = null; loadShop(); }, 250);
      }
      function connectWs() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        try {
          ws = new WebSocket(`${proto}//${location.host}/ws/library`);
        } catch (err) {
          console.warn("[CookingFoil] ws construct failed:", err);
          scheduleReconnect();
          return;
        }
        ws.addEventListener("open", () => {
          wsRetry = 0;
          console.info("[CookingFoil] ws connected");
        });
        ws.addEventListener("message", (ev) => {
          let msg;
          try { msg = JSON.parse(ev.data); } catch { return; }
          if (msg.type === "shop-updated") scheduleReload();
        });
        ws.addEventListener("close", () => { ws = null; scheduleReconnect(); });
        ws.addEventListener("error", () => { /* close fires next */ });
      }
      function scheduleReconnect() {
        // Exponential backoff capped at 30s.
        const delay = Math.min(30_000, 1000 * Math.pow(2, Math.min(wsRetry++, 5)));
        setTimeout(connectWs, delay);
      }
      connectWs();
    </script>
  </body>
</html>
